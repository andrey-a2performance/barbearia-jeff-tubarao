<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Restrito | A2 Management</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --gold: #c5a059;
            --dark-bg: #0a0a0a;
            --card-bg: rgba(22, 22, 22, 0.9);
        }

        body {
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)), url('https://images.unsplash.com/photo-1503951914875-452162b0f3f1?q=80&w=1470');
            background-size: cover;
            background-position: center;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .login-box {
            background: var(--card-bg);
            padding: 50px 40px;
            border: 1px solid rgba(197, 160, 89, 0.2);
            border-radius: 4px;
            text-align: center;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
        }

        h2 {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            font-size: 2rem;
            margin-bottom: 10px;
        }

        p {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .input-group {
            position: relative;
            margin-bottom: 25px;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gold);
        }

        input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            border-radius: 4px;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 10px rgba(197, 160, 89, 0.2);
        }

        button {
            width: 100%;
            padding: 15px;
            background: var(--gold);
            color: black;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.4s;
            margin-top: 10px;
        }

        button:hover {
            background: white;
            box-shadow: 0 0 15px rgba(255,255,255,0.3);
        }

        .a2-badge {
            margin-top: 30px;
            font-size: 0.6rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        .a2-badge span {
            color: var(--gold);
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>Acesso Restrito</h2>
        <p>Barbearia Jeff Braga</p>

        <form id="loginForm">
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="senha" placeholder="Insira sua senha de acesso" required>
            </div>
            <button type="submit">Entrar no Sistema <i class="fas fa-arrow-right ml-2"></i></button>
        </form>

        <div class="a2-badge">
            Powered by <span>A2 Performance</span>
        </div>
    </div>

    <script>
        document.getElementById("loginForm").onsubmit = function(e) {
            e.preventDefault();
            const pass = document.getElementById("senha").value;

            // MÁGICA DO ACESSO A2 PERFORMANCE
            if (pass === "jeff2026") {
                // Senha do Patrão (Libera o Financeiro)
                localStorage.setItem("auth_jeff", "jeff_admin");
                window.location.href = "admin.html";
            } 
            else if (pass === "equipejeff") {
                // Senha da Equipe (Só vê Agenda)
                localStorage.setItem("auth_jeff", "equipe_comum");
                window.location.href = "admin.html";
            } 
            else {
                alert("⛔ Senha incorreta. Acesso negado.");
            }
        };
    </script>

</body>
</html>
