<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: 'Montserrat', sans-serif; }
        .card { background: #000; border: 1px solid #c5a059; padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); width: 450px; }
        h1 { font-family: 'Bebas Neue'; color: #c5a059; font-size: 42px; margin-bottom: 30px; letter-spacing: 3px; }
        .swatch-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .swatch { height: 120px; border-radius: 12px; display: flex; flex-direction: column; justify-content: flex-end; padding: 10px; color: white; font-weight: bold; font-size: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .black { background: #0a0a0a; }
        .gold { background: #c5a059; color: #000; }
        .red { background: #b91c1c; }
        .white { background: #f3f4f6; color: #000; }
        p { color: #c50b0b; font-size: 10px; margin-top: 30px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Identidade Visual<br>Jeff Braga</h1>
        <div class="swatch-grid">
            <div class="swatch black">#0A0A0A<br>PRETO PROFUNDO</div>
            <div class="swatch gold">#C5A059<br>OURO VELHO</div>
            <div class="swatch red">#B91C1C<br>VERMELHO PAIXÃO</div>
            <div class="swatch white">#F3F4F6<br>OFF-WHITE</div>
        </div>
        <p>Tipografia: Bebas Neue & Montserrat</p>
    </div>
</body>
</html>
